<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Electrum round coin -->
  <circle cx="50" cy="50" r="40" fill="#E8E8AD" stroke="#6A6A40" stroke-width="2.5"/>
  <!-- Inner ring -->
  <circle cx="50" cy="50" r="32" fill="none" stroke="#6A6A40" stroke-width="1" opacity="0.5"/>
  <!-- Two blue eyes -->
  <circle cx="34" cy="50" r="10" fill="#3B82F6"/>
  <circle cx="66" cy="50" r="10" fill="#3B82F6"/>
  <!-- Pupils -->
  <circle cx="34" cy="50" r="4" fill="#1A1A6A"/>
  <circle cx="66" cy="50" r="4" fill="#1A1A6A"/>
  <!-- Eye shine -->
  <circle cx="31" cy="47" r="2" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="63" cy="47" r="2" fill="#FFFFFF" opacity="0.7"/>
</svg>
